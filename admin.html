<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Админ-панель — DevStudio</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid var(--border); }
    .filter-bar { display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap; }
    .filter-bar select, .filter-bar input { padding:10px 14px;background:var(--bg-alt);border:1px solid var(--border);border-radius:10px;color:var(--text); }
    .empty-state { text-align:center;padding:40px;color:var(--text-muted); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="logo">🔐 Админ-панель</div>
    <a href="index.html" class="btn btn--secondary">← На сайт</a>
  </nav>

  <!-- Вход -->
  <section id="adminLogin" class="section active" style="text-align:center;padding:60px 20px">
    <h2 style="margin-bottom:20px">Вход для администратора</h2>
    <input type="password" id="adminPass" placeholder="Пароль" style="max-width:300px;width:100%;padding:14px;margin-bottom:15px" />
    <button id="loginBtn" class="btn">Войти</button>
    <p id="loginError" style="color:var(--danger);margin-top:15px;display:none">❌ Неверный пароль</p>
  </section>

  <!-- Панель -->
  <section id="adminPanel" class="section">
    <div class="admin-header">
      <h2>📋 Заказы</h2>
      <button id="logoutBtn" class="btn btn--secondary">Выйти</button>
    </div>
    
    <div class="filter-bar">
      <select id="filterStatus">
        <option value="">Все статусы</option>
        <option value="new">🆕 Новые</option>
        <option value="in_progress">🔄 В работе</option>
        <option value="completed">✅ Готовые</option>
      </select>
      <input type="text" id="searchQuery" placeholder="Поиск по имени или описанию..." />
    </div>
    
    <div id="ordersList"></div>
  </section>

  <!-- Модальное окно заказа -->
  <div id="orderModal" class="modal">
    <div class="modal__content modal__content--wide">
      <span class="modal__close">&times;</span>
      <h3 style="margin-bottom:20px">Заказ #<span id="modalOrderId"></span></h3>
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
        <div>
          <p><strong>Клиент:</strong> <span id="modalClient"></span></p>
          <p><strong>Email:</strong> <span id="modalEmail"></span></p>
          <p><strong>Тип:</strong> <span id="modalType"></span></p>
          <p><strong>Дата:</strong> <span id="modalDate"></span></p>
        </div>
        <div>
          <p><strong>Статус:</strong>
            <select id="modalStatus" style="margin-left:10px;padding:6px 12px;border-radius:8px;background:var(--bg-alt);border:1px solid var(--border);color:var(--text)">
              <option value="new">🆕 Новый</option>
              <option value="in_progress">🔄 В работе</option>
              <option value="completed">✅ Готов</option>
            </select>
          </p>
          <p><strong>Код доступа:</strong> <code id="modalSecret" style="background:var(--bg);padding:4px 8px;border-radius:4px"></code></p>
        </div>
      </div>
      
      <div style="margin-bottom:20px">
        <p><strong>Описание задачи:</strong></p>
        <p id="modalDesc" style="background:var(--bg-alt);padding:15px;border-radius:10px;margin-top:8px;white-space:pre-wrap"></p>
      </div>
      
      <!-- Загрузка файла -->
      <div style="margin-bottom:20px">
        <p><strong>Готовая работа:</strong></p>
        <label class="file-upload">
          <input type="file" id="resultFile" />
          <span id="fileLabel">📎 Нажмите или перетащите файл для загрузки</span>
        </label>
        <p id="uploadStatus" style="margin-top:10px;font-size:0.9rem"></p>
        <p id="currentFile" style="margin-top:10px"></p>
      </div>
      
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button id="saveOrderBtn" class="btn">💾 Сохранить изменения</button>
        <button id="copyLinkBtn" class="btn btn--secondary">🔗 Скопировать ссылку для клиента</button>
      </div>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
